<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepLog - Cadastro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f0f4f8;
            font-family: sans-serif;
        }

        .card {
            background-color: #ffffff;
            border: 1px solid #d0dce8;
            border-radius: 12px;
            padding: 40px 36px;
            width: 100%;
            max-width: 360px;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #1a3a5c;
            margin-bottom: 24px;
            text-align: center;
        }

        label {
            font-size: 13px;
            color: #4a6080;
            display: block;
            margin-bottom: 4px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #c0cfe0;
            border-radius: 8px;
            font-size: 14px;
            color: #1a3a5c;
            background-color: #f7fafc;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus,
        input[type="email"]:focus,
        input[type="password"]:focus {
            border-color: #4a90d9;
            background-color: #fff;
        }

        button[type="submit"] {
            width: 100%;
            padding: 10px;
            background-color: #2b6cb0;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 4px;
            transition: background-color 0.2s;
        }

        button[type="submit"]:hover {
            background-color: #1a4f8a;
        }

        .login-link {
            display: block;
            text-align: center;
            margin-top: 16px;
            font-size: 13px;
            color: #4a6080;
        }

        .login-link a {
            color: #2b6cb0;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Cadastro</h1>
        <form action="" method="POST">
            <label for="username">Nome de usuário:</label>
            <input type="text" id="username" name="username" required>

            <label for="matricula">Matrícula:</label>
            <input type="text" id="matricula" name="matricula" required>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>

            <label for="password">Senha:</label>
            <input type="password" id="password" name="password" required>

            <label for="same_password">Confirmar senha:</label>
            <input type="password" id="same_password" name="same_password" required>

            <button type="submit">Registrar</button>

            <span class="login-link">Já tem conta? <a href="login.html">Entrar</a></span>
        </form>
    </div>
</body>
</html>
